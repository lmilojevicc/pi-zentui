[tools]
node = "24"

[env]
_.path = ["node_modules/.bin"]

[tasks.setup]
description = "Install project dependencies"
run = "npm install"

[tasks.typecheck]
description = "Run TypeScript checks"
run = "npm run typecheck"

[tasks.test]
description = "Run tests"
run = "npm test"

[tasks.lint]
description = "Run Biome"
run = "npm run lint"

[tasks.fmt]
description = "Format files with Biome"
run = "npm run fmt"

[tasks.verify]
description = "Run the default local checks"
run = "npm run verify"

[tasks.ci]
description = "Run the CI-equivalent checks locally"
run = "npm ci && npm run verify && npm run pack:check"

[tasks.pack]
description = "Show the npm package contents"
run = "npm run pack:check"
